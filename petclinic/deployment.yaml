apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      imagePullSecrets:
        - name: nexus-regcred
      containers:
        - name: petclinic
          image: 10.0.13.79/petclinic:latest
          ports:
            - containerPort: 8080
